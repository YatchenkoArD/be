# Прод-стек: app (gunicorn) + arq-worker + Redis.
# PostgreSQL — управляемая БД Timeweb (НЕ контейнер): host/port/user/pass
# берутся из .env (POSTGRES_HOST должен указывать на хост из панели Timeweb).
# TLS/вход снаружи — отдельный edge-Caddy (docker-compose.edge.yml), общая
# внешняя сеть `edge`. Staging-стек — docker-compose.staging.yml.
#
# Запуск руками (обычно через ./deploy.sh prod):
#   1) заполнить .env (SECRET_KEY, POSTGRES_*, DOMAIN, CORS_ORIGINS)
#   2) сгенерировать боевые ключи: python -m app.scripts.gen_keys (в ./keys)
#   3) docker network create edge  (один раз; deploy.sh делает сам)
#   4) миграции:  docker compose -p rumi-prod -f docker-compose.prod.yml run --rm app alembic upgrade head
#   5) docker compose -p rumi-prod -f docker-compose.prod.yml up -d
services:
  redis:
    image: redis:7-alpine
    container_name: rumi-prod-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    image: rumi-app:prod
    container_name: rumi-prod-app
    env_file: .env
    environment:
      # переопределяем локальные значения из .env под контейнерную сеть
      ENVIRONMENT: production
      TZ: Asia/Novosibirsk
      COOKIE_SECURE: "true"
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["https://${DOMAIN:-localhost}"]'
      WEB_CONCURRENCY: "2"
    volumes:
      - ./keys:/app/keys:ro           # RS256-ключи монтируем, не пекём в образ
      - uploads_prod:/app/uploads     # загруженные фото; переживают деплой
    networks:
      - default
      - edge                          # виден edge-Caddy как rumi-prod-app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Фоновые задачи (блок 06): тот же образ, вместо gunicorn — arq-воркер.
  # Задачи и настройки: app/tasks.py + app/core/worker.py
  arq-worker:
    image: rumi-app:prod
    container_name: rumi-prod-arq
    env_file: .env
    command: ["arq", "app.core.worker.WorkerSettings"]
    environment:
      ENVIRONMENT: production
      TZ: Asia/Novosibirsk
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./keys:/app/keys:ro           # понадобятся задачам, работающим с БД/токенами
    depends_on:
      redis:
        condition: service_healthy
    # HEALTHCHECK из Dockerfile проверяет /health веб-приложения — для
    # воркера заменяем на штатную проверку arq (health-ключ в Redis).
    healthcheck:
      test: ["CMD", "arq", "--check", "app.core.worker.WorkerSettings"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

networks:
  edge:
    external: true

volumes:
  uploads_prod:
